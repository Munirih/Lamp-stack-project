name: Test, Build docker image, push to Dockerhub and deploy to EC2

env:
  IMAGE_NAME: munirihzowe/lamp-stack

on:
  push:
    branches: [ main ]

jobs:
  test-app:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.12' ]
        
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4

    - name: Set up python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: | 
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then 
          pip install -r requirements.txt;
        fi

    - name: Start application server
      run: |
        gunicorn app:app --bind 0.0.0.0:5000 --daemon 
        sleep 5
        
    - name: Test the app
      run: | 
        curl -f http://0.0.0.0:5000/ || exit 1
        curl -f http://0.0.0.0:5000/health || exit 1
        echo "Health check passed! Proceed with building Docker image..."
    
  build-docker-image:
    needs: test-app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ SECRETS.DOCKERHUB_USERNAME }}
          password: ${{ SECRETS.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME}}:latest
      - name: Test Docker image
        run: |
          docker run -d --name test-container -p 5000:5000 ${{ env.IMAGE_NAME }}:latest
          sleep 5
          docker ps | grep test-container
          docker logs test-container
          docker stop test-container
    
  
