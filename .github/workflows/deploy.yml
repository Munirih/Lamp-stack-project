name: Build docker image and push to Dockerhub

env:
  IMAGE_NAME: munirihzowe/lamp-stack

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12' ]
        
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4

    - name: Set up python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: | 
        python -m pip install --upgrade pip
        if [ -f requirements.txt];
        then 
        pip install -r requirements.txt;
        fi

    - name: Start application server
      run: |
        gunicorn app:app --bind 0.0.0.0:5000 --deamon 
        sleep 5
        
    - name: Test the app
      run: | 
        curl -f http://0.0.0.0:5000/ || exit 1
        curl -f http://0.0.0.0:500/health || exit 1
        echo "Health check passed! Proceed with building Docker image..."
    
        
    
  
